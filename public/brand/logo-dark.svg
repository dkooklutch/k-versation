<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 52" fill="none">
  <!-- K mark: vertical stroke -->
  <rect x="0" y="5" width="3.5" height="42" fill="#f5f3ef"/>
  <!-- K upper arm -->
  <polygon points="3.5,26 3.5,5 26,5 3.5,26" fill="#f5f3ef"/>
  <polygon points="3.5,26 26,5 30,5 5,26" fill="#f5f3ef"/>
  <!-- K lower arm -->
  <polygon points="3.5,26 30,47 26,47 3.5,26" fill="#f5f3ef"/>
  <!-- Accent bar -->
  <rect x="3.5" y="24.5" width="11" height="2" fill="#2d4a68"/>
  <!-- Separator -->
  <rect x="38" y="25.5" width="6" height="1" fill="#f5f3ef" opacity="0.35"/>
  <!-- VERSATION -->
  <text x="52" y="37" font-family="Georgia, serif" font-size="24" fill="#f5f3ef" letter-spacing="5" font-weight="400">VERSATION</text>
</svg>
